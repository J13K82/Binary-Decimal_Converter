<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch Converter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Batch 32-bit Converter</h1>
    <p class="subtitle">
      Convert multiple values at once between Int32, Float32, Binary, Hex, and Octet.
    </p>

    <nav class="top-tabs">
      <a href="index.html" class="tab">Single</a>
      <a href="multi.html" class="tab active">Multi</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2>Multiple Value Converter</h2>
      <p class="help">
        Choose the input type and output type for each row, then calculate all at once.
      </p>

      <div class="top-actions">
        <button id="addRowBtn">Add Row</button>
        <button id="calculateAllBtn">Calculate All</button>
        <button id="clearRowsBtn">Clear All</button>
      </div>

      <div id="rowsContainer"></div>
    </section>
  </main>

  <footer>
    <p>Binary & Decimal Converter</p>
  </footer>

  <script src="multi.js"></script>
</body>
</html>
